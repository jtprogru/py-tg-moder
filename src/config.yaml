---
# Chats (numeric id or @username) where the bot is allowed to operate.
# Anywhere else the bot stays silent and leaves the chat.
allowed_chats:
  - '@jtprogru_chat'

moderation:
  # Delete the replied-to message when banning by reply.
  delete_on_ban: true
  # Number of warns before an automatic punishment, and what it does (mute|ban).
  warn_limit: 3
  warn_action: mute
  # Content filter for messages from newcomers (also re-checks edited messages).
  newcomer_filter:
    enabled: true
    # A user is a "newcomer" until they hit either threshold (whichever first).
    max_messages: 5
    max_age_seconds: 86400
    # What to do on a hit: delete | mute | warn.
    action: delete
    block_links: true
    block_forwards: true
    block_mentions: true
  # Flood control: more than `limit` messages within `window_seconds` from one
  # user triggers a temporary mute for `mute_seconds` (native Telegram until_date).
  flood:
    enabled: true
    limit: 7
    window_seconds: 10
    mute_seconds: 60
  # Captcha for new members: mute on join until they tap a button. Pass within
  # timeout_seconds -> unmute + welcome; otherwise fail_action (kick|ban).
  captcha:
    enabled: true
    timeout_seconds: 60
    fail_action: kick
  # Delete disallowed media types from non-admins; optionally notify the author
  # with a notice that self-deletes after notify_ttl_seconds.
  media:
    enabled: true
    notify: true
    notify_ttl_seconds: 15
    block_voice: true
    block_video: true
    block_video_note: true
    block_location: true

# Web admin dashboard (analytics over the moderation data). Auth is via the
# Telegram Login Widget: only users from admin_ids below may log in. The
# widget requires a public HTTPS domain bound to the bot via @BotFather
# (/setdomain); set public_url to that origin.
web:
  enabled: false     # env WEB_ENABLED wins
  host: '0.0.0.0'    # env WEB_HOST wins
  port: 8080         # env WEB_PORT wins
  public_url: ''     # env WEB_PUBLIC_URL wins

# Telegram user ids allowed to open the web dashboard.
admin_ids: []

storage:
  # SQLite database file for moderation state. Overridden by the DB_PATH env var.
  # Point this at a mounted volume so state survives restarts.
  path: 'moder.db'
  # History retention: audit log, soft-deleted warns and per-day message stats
  # older than `days` are hard-deleted once a day at `purge_hour_utc`.
  # Live moderation state (active warns, mutes, members) is never purged.
  retention:
    days: 365          # env RETENTION_DAYS wins
    purge_hour_utc: 4  # env RETENTION_PURGE_HOUR wins

