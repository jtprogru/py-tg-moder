apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: py-tg-moder-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-tg-moder
spec:
  selector:
    matchLabels:
      app: py-tg-moder
  replicas: 1
  # Single replica owns the SQLite file; recreate (don't run two pods at once).
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: py-tg-moder
    spec:
      containers:
      - name: py-tg-moder
        image: ghcr.io/jtprogru/py-tg-moder:latest
        imagePullPolicy: Always
        env:
          - name: TELEGRAM_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: py-tg-moder-secret
                key: tg_token
          - name: DB_PATH
            value: /data/moder.db
          - name: WEB_ENABLED
            value: "true"
          - name: WEB_SESSION_SECRET
            valueFrom:
              secretKeyRef:
                name: py-tg-moder-secret
                key: web_session_secret
        ports:
          - name: http
            containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
        volumeMounts:
          - name: data
            mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: py-tg-moder-data
      imagePullSecrets:
      - name: ghcrio-auth-secret
---
apiVersion: v1
kind: Service
metadata:
  name: py-tg-moder
spec:
  selector:
    app: py-tg-moder
  ports:
    - name: http
      port: 80
      targetPort: http
