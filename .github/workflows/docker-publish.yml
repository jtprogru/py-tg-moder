name: Docker

"on":
  push:
    tags: [ 'v*.*.*' ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Green tests are a hard gate for the build below (needs: test).
  test:
    uses: ./.github/workflows/testing.yml

  # Guard against publishing an image whose tag doesn't match the project
  # version. Keeps git tag <-> pyproject.toml <-> image tag in lockstep.
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify git tag matches pyproject version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version="$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "git tag:   $tag_version"
          echo "pyproject: $pyproject_version"
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag v$tag_version does not match pyproject.toml version $pyproject_version"
            exit 1
          fi

  build-docker-image:
    needs: [ test, version-check ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Emulation so buildx can build non-native architectures.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Built-in token; the job's `packages: write` permission lets it
          # push to ghcr.io for this repo without a long-lived PAT.
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build and push a multi-arch image (amd64 + arm64).
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
