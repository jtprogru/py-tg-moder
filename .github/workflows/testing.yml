name: Testing

"on":
  push:
    branches-ignore: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.14"

    - name: Generate simple env
      run: |
        cat > src/.env << EOF
          export SENTRY_DSN="https://xxxhsdshd@o444444.ingest.sentry.io/1234567"
          export TELEGRAM_BOT_TOKEN='1234567890:QWERTYUHGVFDRTGaaa'
          export VERSION=0.2.0
        EOF

    - name: Install dependencies
      run: uv sync --dev

    - name: Run ruff format check
      run: uv run ruff format --check src/ tests/

    - name: Run ruff lint
      run: uv run ruff check src/ tests/

    - name: Run pytest with coverage gate
      run: uv run pytest --cov=src --cov-report=term --cov-fail-under=85
