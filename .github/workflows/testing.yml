name: Testing

"on":
  push:
    branches-ignore: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.14"

    - name: Generate simple env
      run: |
        cat > src/.env << EOF
          export SENTRY_DSN="https://xxxhsdshd@o444444.ingest.sentry.io/1234567"
          export TELEGRAM_BOT_TOKEN='1234567890:QWERTYUHGVFDRTGaaa'
          export VERSION=0.1.2
        EOF

    - name: Install dependencies
      run: uv sync --dev

    - name: Run black
      run: uv run black --check src/

    - name: Run isort
      run: uv run isort --check-only src/

    - name: Run flake8
      run: uv run flake8 src/

    - name: Run pytest
      run: uv run pytest
