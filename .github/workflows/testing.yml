name: Testing

"on":
  # Run on every branch push (feature branches included), but not on tag
  # pushes — those go through the release workflow, which calls this one.
  push:
    branches: [ "**" ]
    tags-ignore: [ "**" ]
  pull_request:
  # Allow the release workflow to require green tests before building.
  workflow_call:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        # Project targets Python 3.14 (see pyproject.toml requires-python).
        python-version: "3.14"

    - name: Verify uv.lock is up to date
      run: uv lock --check

    - name: Generate simple env
      run: |
        cat > src/.env << EOF
          export SENTRY_DSN="https://xxxhsdshd@o444444.ingest.sentry.io/1234567"
          export TELEGRAM_BOT_TOKEN='1234567890:QWERTYUHGVFDRTGaaa'
          export VERSION=0.2.0
        EOF

    - name: Install dependencies
      run: uv sync --dev

    - name: Run ruff format check
      run: uv run ruff format --check src/ tests/

    - name: Run ruff lint
      run: uv run ruff check src/ tests/

    - name: Run pytest with coverage gate
      run: uv run pytest --cov=src --cov-report=term --cov-fail-under=85
